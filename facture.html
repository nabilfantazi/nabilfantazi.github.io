<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>A4 Paper</title>
    <link rel="stylesheet" href="./A4.css" />
    <link rel="stylesheet" href="/facture/style.css" />
    <script src="/facture/controles.js" defer></script>
    <script src="/facture/script.js" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
  function saveAsPrintPdf() {
  const element = document.querySelector(".page");

  const options = {
    margin: 0,
    filename: 'document.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { 
      scale: 2, 
      useCORS: true, 
      // FORCE the canvas to be exactly the width of your element
      // This removes the "left-aligned" gap
      width: element.offsetWidth, 
      windowWidth: element.offsetWidth,
      scrollY: 0,
      scrollX: 0
    },
    jsPDF: { 
      unit: 'mm', 
      format: 'a4', 
      orientation: 'portrait' 
    },
    pagebreak: { mode: 'avoid-all' }
  };

  html2pdf()
    .set(options)
    .from(element)
    .toPdf()
    .get('pdf')
    .then(function(pdf) {
      const totalPages = pdf.internal.getNumberOfPages();
      if (totalPages > 1) { pdf.deletePage(totalPages); }
    })
    .save();
}
</script>
  </head>
  <body style="--bleeding: 0.5cm; --margin: 0.5cm">
    <div class="controls">
      <!-- Save as Image Button -->
      <button id="saveAsImage" class="control-button image-button">
        <img src="images/save.svg" alt="Download Icon" class="button-icon" />
        Save as Image
      </button>

      <button id="saveAsPdfButton" class="control-button print-button">
        <img src="images/print.svg" alt="Print Icon" class="button-icon" />
        save Document
      </button>
      <!-- Print Document Button -->
      <button id="printPage" class="control-button print-button">
        <img src="images/print.svg" alt="Print Icon" class="button-icon" />
        Print Document
      </button>
    </div>

    <div class="page">
      <div class="InvoiceHeader">
        <h1>FANTAZI NABIL</h1>
        <div>Fourniture et installation d'accessoires auto</div>
      </div>

      <div class="datawrapper">
        <label for="dateFacture">Taher le:</label>
        <input class="text-like-input" type="text" id="dateFacture" />
      </div>
      <div class="InvoiceTop">
        <div class="myinfo" style="grid-template-columns: 50px 1fr">
          <label for="RCN">RCN :</label>
          <input
            type="text"
            id="RCN"
            class="text-like-input"
            value="18/00-2268677A20"
            disabled
          />
          <label for="MFN">MFN :</label>
          <input
            type="text"
            id="MFN"
            class="text-like-input"
            value="185182400637174"
            disabled
          />
          <label for="AIN">AIN :</label>
          <input
            type="text"
            id="AIN"
            class="text-like-input"
            value="18050142415"
            disabled
          />
          <label for="adresseFacture"></label>
          <input
            type="text"
            id="adresseFacture"
            class="text-like-input"
            value="TAHER JIJEL"
            disabled
          />
        </div>
        <div class="clinetInvoiceInfo">
          <label for="clientNameFacture">Client :</label>
          <input class="text-like-input" type="text" id="clientNameFacture" />
          <label for="dossierFacture">N° dossier :</label>
          <input class="text-like-input" type="text" id="dossierFacture" />
          <label for="modelFacture">Véhicule :</label>
          <input class="text-like-input" type="text" id="modelFacture" />
          <label for="ImmatriculationFacture">Immatriculation :</label>
          <input
            class="text-like-input"
            type="text"
            id="ImmatriculationFacture"
          />
        </div>
      </div>
      <div class="InvoiceNumber">
        <label for="invoiceNumber" style="justify-self: end"
          >Facture N° :</label
        >
        <input
          class="text-like-input"
          type="text"
          id="invoiceNumber"
          style="font-weight: bold; width: fit-content"
        />
      </div>
      <div class="table-container">
        <!-- Header Row -->
        <div class="cell header">N</div>
        <div class="cell header">Designation</div>
        <div class="cell header">QTE</div>
        <div class="cell header">PU</div>
        <div class="cell header">Montant</div>

        <!-- Data Row -->
        <div class="cell center">1</div>
        <div class="cell" style="display: flex; flex-direction: column">
          <textarea
            id="invoiceProductText"
            class="text-like-input"
            style="width: 100%; resize: none; overflow: hidden"
          ></textarea>
        </div>
        <div class="cell center">
          <div>
            <input
              id="invoiceQ"
              type="text"
              value="1"
              class="text-like-input"
              style="width: 100%; text-align: center"
            />
          </div>
        </div>
        <div class="cell numeric">
          <div class="numeric-input">
            <input
              id="invoicePU"
              type="text"
              class="text-like-input"
              placeholder="0,00"
            />
          </div>
        </div>
        <div class="cell numeric">
          <div class="numeric-input">
            <input
              id="invoiceM"
              type="text"
              class="text-like-input"
              placeholder="0,00"
              disabled
            />
          </div>
        </div>

        <!-- Total HT -->
        <div class="cell total-row" style="grid-column: 4">TOTAL H.T:</div>
        <div class="cell numeric">
          <div class="numeric-input">
            <input
              id="HT"
              type="text"
              class="text-like-input"
              placeholder="0,00"
              disabled
            />
          </div>
        </div>

        <!-- TVA -->
        <div class="cell total-row" style="grid-column: 4">TVA 0%:</div>
        <div class="cell numeric">
          <div class="numeric-input">
            <input
              id="TVA"
              type="text"
              class="text-like-input"
              value="0,00 DA"
              disabled
            />
          </div>
        </div>

        <!-- Total TTC -->
        <div class="cell total-row" style="grid-column: 4">TOTAL T.T.C:</div>
        <div class="cell numeric">
          <div class="numeric-input">
            <input
              id="TTC"
              type="text"
              class="text-like-input"
              placeholder="0,00"
              disabled
            />
          </div>
        </div>
      </div>
      <div class="text" style="font-weight: 600">
        Arrêté la présente facture à la somme de :
        <br />
        <textarea
          id="toletters"
          type="text"
          style="width: 100%; resize: none; overflow: hidden"
          class="text-like-input"
        >
        </textarea>
      </div>
      <div class="invoiceSignature">
        <div class="sig-label">SIGNATURE</div>
        <div class="image-container">
          <div id="image2">
            <img src="/images/empty2.png" alt="cachet" />
          </div>
          <div id="image1">
            <img src="/images/empty1.png" alt="cachet" />
          </div>
        </div>
      </div>
      <div class="footer">
        <span style="align-self: flex-end">Siège social: Taher - Jijel</span>
        <span>Telephone: 0775 38 39 64 - 0656 95 93 41</span>
      </div>
    </div>
  </body>
</html>
